<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finn-Signal Feedback</title>
    <style>
      body {
        margin: 0;
        background: #f3f5f8;
        color: #111827;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 640px;
        margin: 56px auto;
        padding: 0 18px;
      }

      section {
        background: #ffffff;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        padding: 26px;
      }

      h1 {
        font-size: 28px;
        line-height: 1.15;
        margin: 0 0 12px;
      }

      p {
        color: #374151;
        font-size: 16px;
        line-height: 1.5;
        margin: 0 0 14px;
      }

      code {
        background: #eef2f7;
        border-radius: 6px;
        color: #111827;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Finn-Signal feedback endpoint</h1>
        <p>This deployment is only the hosted feedback receiver for Finn-Signal.</p>
        <p>The digest buttons call <code>/api/feedback</code> with a digest id, item number, and rating.</p>
      </section>
    </main>
  </body>
</html>
